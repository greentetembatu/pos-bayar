<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pos Bayar Dashboard</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <meta
      name="description"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."
    />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pos Bayar" />
    <meta
      property="og:description"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel"
    />
    <meta
      property="og:url"
      content="https://greentetembatu.github.io/pos-bayar/"
    />
    <meta property="og:site_name" content="Pos Bayar" />
    <meta
      property="og:image"
      content="https://greentetembatu.github.io/pos-bayar/adi-mardani-dev.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta
      property="og:image:alt"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."
    />
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="shortcut icon" href="icon-512.ico" type="image/x-icon" />
    <link rel="manifest" href="manifest.json" />

    <!--<link rel="stylesheet" href="style.css" />-->
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <section class="app">
      <!-- SIDEBAR -->
      <section class="sidebar">
        <div class="sidebar-header">
          <h2>DASHBOARD</h2>
        </div>
          <ul class="sidebar-menu">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="kasir.html">Kasir</a></li>
            <li><a href="produk.html">Produk</a></li>
            <li><a href="riwayat.html">Riwayat</a></li>
            <li><a href="member.html">Member</a></li>
          </ul>
       
          <div class="button-aside">
            <button class="btn-instal" id="installBtn" style="display: none">
              Install Aplikasi</button>
            <button class="btn-logout" onclick="logoutKasir()">
               Logout</button>
          </div>
      </section>
      
      <main class="content">
        <header class="content-header">
          <h1>Dashboard</h1>
          <h3>Pengaturan Toko</h3>
      
          <input type="text" id="namaToko" placeholder="Nama Toko" />
          <input type="text" id="alamatToko" placeholder="Teks Baris 1" />
          <input type="text" id="additionalToko" placeholder="Teks Baris 2" />
          <div class="button-simpan-header">
            <button onclick="simpanPengaturanToko()">Simpan</button>
          </div>
        </header>

        <a href="kasir.html" class="btn-primary">➜ Buka Kasir</a>

        <section class="stats">
          <a href="produk.html" style="text-decoration: none; color: inherit">
            <div class="card stat-card">
              <h3>Total Produk</h3>
              <p id="totalProduk">0</p>
            </div>
          </a>
          <a href="riwayat.html" style="text-decoration: none; color: inherit">
            <div class="card stat-card">
              <h3>Total Transaksi</h3>
              <p id="totalTransaksi">0</p>
            </div>
          </a>
          <div class="card stat-card">
            <h3>Omzet</h3>
            <p id="totalOmzet">Rp 0</p>
          </div>
          <div class="card stat-card">
            <h3>Laba</h3>
            <p id="totalLaba">Rp 0</p>
          </div>
        </section>
      </main>
    </section>
    <!-- SCRIPT (TIDAK DIUBAH) -->

    <script src="js/dasboard.js"></script>
    <script src="js/data.js"></script>
    <script src="js/struk.js"></script>
    <script src="js/kasir.js"></script>
    <script src="js/produk.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/riwayat.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch((err) => console.error("SW failed:", err));
      }
    </script>
  </body>
</html>
