<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pos Bayar Kasir</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link rel="shortcut icon" href="icon-512.ico" type="image/x-icon" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" />

    <meta
      name="description"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."
    />
    <meta property="og:locale" content="id_ID" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pos Bayar" />
    <meta
      property="og:description"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel"
    />
    <meta
      property="og:url"
      content="https://greentetembatu.github.io/pos-bayar/"
    />
    <meta property="og:site_name" content="Pos Bayar" />
    <meta
      property="og:image"
      content="https://greentetembatu.github.io/pos-bayar/adi-mardani-dev.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta
      property="og:image:alt"
      content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."
    />

    <!--<link rel="stylesheet" href="style.css" />-->
    <link rel="stylesheet" href="kasir.css" />
  </head>

  <body>
    <section class="app">
      <!-- SIDEBAR -->
      <section class="sidebar">
        <div class="sidebar-header">
          <h2>DASHBOARD</h2>
        </div>
        <ul class="sidebar-menu">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="kasir.html" class="active">Kasir</a></li>
          <li><a href="produk.html">Produk</a></li>
          <li><a href="riwayat.html">Riwayat</a></li>
          <li><a href="member.html">Member</a></li>
        </ul>

        <div class="button-aside">
          <button class="btn-instal" id="installBtn" style="display: none">
            Install Aplikasi
          </button>
          <button class="btn-logout" onclick="logoutKasir()">Logout</button>
        </div>
      </section>

      <!-- Content -->
      <main class="content">
        <h1>Kasir</h1>

        <!-- Form Kasir -->
        <div class="card">
          <label>Produk</label>
          <div class="produk-wrapper">
            <div class="autocomplete">
              <input
                type="text"
                id="produkInput"
                placeholder="Ketik nama atau barcode..."
                autocomplete="off"
              />
              <div id="produkList" class="autocomplete-list"></div>
            </div>

            <button onclick="toggleScannerKasir()" id="btnScanKasir">
              📷 Scan
            </button>
          </div>

          <div id="scannerContainerKasir" class="scanner-container-kasir">
            <div id="laserLine" class="scan-line"></div>

            <div id="readerKasir" class="reader-kasir"></div>
          </div>

          <input type="hidden" id="produkId" />

          <label>Jumlah</label>
          <input type="number" id="qty" value="1" min="1" />

          <button onclick="tambahKeKeranjang()" class="btn-tambah-keranjang">
            + ke Keranjang
          </button>
        </div>

        <!-- Keranjang -->
        <div class="card">
          <h3>Keranjang</h3>

          <table width="100%" id="keranjangTable">
            <thead>
              <tr>
                <th>Produk</th>
                <th>Qty</th>
                <th>Subtotal</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody></tbody>
          </table>
        </div>

        <!-- Cari Member -->
        <div class="card">
          <h2>Cari Member / Scan Kartu</h2>

          <div class="search-box">
            <div>
              <input
                type="text"
                id="searchMember"
                placeholder="Nama / ID / No HP"
              />

              <button onclick="cariDataMember()">Cari</button>

              <button onclick="mulaiScanMemberKasir()">
                📸 Buka Kamera Scanner
              </button>
            </div>

            <div id="readerMember"></div>

            <small class="scanner-info">
              Gunakan kamera untuk scan barcode pada kartu member
            </small>
          </div>
        </div>

        <!-- Checkout -->
        <div class="checkout-box">
          <p>Subtotal: <strong id="totalBelanja">Rp 0</strong></p>

          <div class="input-group">
            <label for="diskonPersen">Diskon Member</label>

            <input
              type="number"
              id="diskonPersen"
              placeholder="Masukkan %"
              oninput="updateTotalDiskon()"
            />
          </div>

          <p>
            Potongan:
            <strong id="nilaiDiskon" class="text-danger">Rp 0</strong>
          </p>

          <div class="total-highlight">
            <span>Total Bayar:</span>
            <strong id="totalAkhir">Rp 0</strong>
          </div>

          <p class="profit-info">
            Estimasi Laba:
            <strong id="totalLaba">Rp 0</strong>
          </p>

          <button class="btn-pay" onclick="bayar()">Bayar Sekarang</button>
        </div>

        <!-- Preview Member -->
        <div class="card">
          <h2>Preview Kartu Member</h2>

          <div id="kartuMember" class="member-card">
            <h3 id="cardTokoMember" class="member-title"></h3>

            <small id="cardAlamatMember" class="member-small"></small>

            <small id="cardHpTokoMember" class="member-small"></small>

            <hr />

            <div class="info-member">
              <p id="cardNamaMember"></p>
              <p id="cardEmailMember"></p>
              <p id="cardHpMember"></p>

              <p id="cardNoMember" class="member-number"></p>
            </div>

            <svg id="barcodeMember" class="barcode-member"></svg>
          </div>

          <br />

          <p id="statusLoyalitas" class="status-loyalitas"></p>

          <div id="aksiMember" class="aksi-member">
            <button
              onclick="printKartuMember()"
              id="btnPrintMember"
              class="btn-print-member"
            >
              Cetak Kartu
            </button>
          </div>
        </div>
      </main>
      <!--<button onclick="pemicuEditMember()" style=" background: #ed8936; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; ">Edit Data</button>
          <button onclick="pemicuHapusMember()" style=" background: #e53e3e; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; ">Hapus Member</button>-->
    </section>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/member.js"></script>
    <script src="js/dasboard.js"></script>
    <script src="js/riwayat.js"></script>
    <script src="js/kasir.js"></script>
    <script src="js/produk.js"></script>
    <script src="js/struk.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch((err) => console.error("SW failed:", err));
      }
    </script>
  </body>
</html>
