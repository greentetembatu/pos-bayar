<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pos Bayar Riwayat</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="icon-512.ico" type="image/x-icon" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" />


<meta name="description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."/>
<meta property="og:locale" content="id_ID" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Pos Bayar" />
<meta property="og:description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel"/>
<meta property="og:url" content="https://greentetembatu.github.io/pos-bayar/"/>
<meta property="og:site_name" content="Pos Bayar" />
<meta property="og:image" content="https://greentetembatu.github.io/pos-bayar/adi-mardani-dev.png"/>
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:alt" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."/>



    <link rel="stylesheet" href="riwayat.css" />
  </head>

  <body>
    <h2>Riwayat Transaksi</h2>
    <ul>
      <button onclick="window.location.href = 'dashboard.html'">
        Dashboard
      </button>
    </ul>
    <input
      type="text"
      id="searchTransaksi"
      placeholder="Cari ID / Kasir / Item..."
      oninput="cariTransaksi()"
    />
    <div id="listRiwayat"></div>
    <table>
      <thead>
        <tr>
          <th>ID Transaksi</th>
          <th>Tanggal</th>
          <th>Kasir</th>
          <!-- 🔥 -->
          <th>ID Kasir</th>
          <th>Nama/ Hp/ Email/ id Member</th>

          <!-- 🔥 -->
          <th>Produk</th>
          <th>Total</th>
          <th>Laba</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="riwayatTable"></tbody>
    </table>

    <div
      id="navigasiRiwayat"
      style="
        display: none;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
        padding: 10px;
      "
    >
      <button
        id="btnPrevRiwayat"
        onclick="gantiHalamanRiwayat(-1)"
        style="
          padding: 8px 15px;
          background: #4a5568;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        ⬅ Prev
      </button>

      <span id="infoHalamanRiwayat" style="font-weight: bold">Halaman 1</span>

      <button
        id="btnNextRiwayat"
        onclick="gantiHalamanRiwayat(1)"
        style="
          padding: 8px 15px;
          background: #4a5568;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Next ➡
      </button>
    </div>

    <h3>🏆 Ranking Member</h3>

    <table border="1" width="100%">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Nama</th>
          <th>ID Member</th>
          <th>HP</th>
          <th>Transaksi</th>
          <th>Total Belanja</th>
          <th>Total Laba</th>
        </tr>
      </thead>
      <tbody id="rankingMember"></tbody>
    </table>
    <div style="margin-top: 10px; text-align: center">
      <button onclick="prevPage()">⬅ Sebelumnya</button>
      <span id="pageInfo"></span>
      <button onclick="nextPage()">Berikutnya ➡</button>
    </div>

    <div class="download-panel">
      <h3>📥 Download Data Transaksi</h3>

      <button onclick="downloadJSON()">Download JSON</button>
      <button onclick="downloadCSV()">Download Excel (CSV)</button>
    </div>

<script src="js/dasboard.js"></script>    
<script src="js/data.js"></script>
<script src="js/storage.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<script src="js/struk.js"></script>
<script src="js/riwayat.js"></script>
<script src="js/produk.js"></script>

  </body>
</html>
