<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cetak Kartu Member - Tata Letak Baru</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
    /* Dasar & Reset */
    body {
        margin: 0;
        padding: 20px;
        font-family: sans-serif;
        background-color: #f0f0f0;
    }

    /* Kontainer agar berjejer di layar */
    .card-print-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
    }

    /* Ukuran Kartu Standar ID Card */
    .page {
        width: 85.6mm;
        height: 53.98mm;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        /* PAKSA WARNA MUNCUL SAAT DI PRINT */
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;

    }

    /* Kartu Depan */
    .front {
        background: #e7ecf5 !important; /* Gunakan !important agar tidak ditimpa browser */
        color: #e69f08;
        padding: 15px;
    }
.front h3 { 
        margin: 5px 0; 
        font-size: 18px; 
        text-transform: uppercase; 
        text-align: center; 
        /* Efek bayangan solid hitam (tanpa blur) */
        text-shadow: 1px 1px 0px #000; 
    }

    .front small { 
        display: block; 
        text-align: center; 
        font-size: 14px; 
        opacity: 1; 
        /* Efek solid 1px agar teks kecil tidak pecah */
        text-shadow: 1px 1px 0px #000;
    }

    .front hr { 
        border: 1px solid #af8703; 
        margin: 8px 0; 
    }
    
    .info { 
        font-size: 14px; 
        line-height: 1.4; 
        text-shadow: 1px 1px 0px #000;
    }

    .info b { 
        color: #e69f08; 
        /* Memberi kontras kuat pada teks ID emas */
        text-shadow: 1px 1px 0px #000;
    }
    /* Barcode di dalam area ID */
    .barcode-svg {
        background: white;
        padding: 4px;
        position: absolute;
        bottom: 25px; /* Sesuaikan posisi naik/turun */
        right: 15px; /* Sesuaikan posisi kanan/kiri */
        width: 100px;
        height: 40px;
        border-radius: 4px;
    }

    /* Kartu Belakang */
    .back {
        background-color: #fff !important;
        color: #333;
        border: 1px solid #ddd;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        text-align: center;
    }
    .back img { width: 100%; height: 55%; object-fit: cover; border-radius: 6px; }
    .snk { font-size: 8px; color: #666; margin-top: 10px; }

    /* PENGATURAN KHUSUS PRINT */
    @media print {
        body { 
            background: none; 
            padding: 0; 
        }
        .card-print-container {
            display: flex !important; /* Paksa tetap berjejer ke kanan */
            flex-direction: row !important;
            gap: 10px;
            justify-content: flex-start;
        }
        /* Hilangkan margin default browser */
        @page {
            size: landscape; /* Mengatur kertas jadi landscape agar muat berjejer */
            margin: 5mm;
        }
        .page {
            box-shadow: none;
            border: 1px solid #201e1e; /* Beri border tipis untuk panduan potong */
        }
    }
</style>
</head>
<body>

    <div class="card-print-container">

        <div class="page front">
            <h3 id="printToko"></h3>
            <small id="printAlamat"></small>
            <small id="printHpToko"></small>
            <hr>
            <div class="info">
                <p>Nama: Bayu</p>
                <p>WhatsApp: 0265485645</p>
                <p>ID: <b>29032026-0006</b></p>
            </div>
            <svg id="barcode" class="barcode-svg"></svg>
        </div>

        <div class="page back">
            <img src="https://picsum.photos/400/200" alt="Banner">
            <div class="snk">
                <b>SYARAT & KETENTUAN</b><br>
                1. Tujuakan kartu ini saat bertransaksi.<br>
                2. Tidak dapat dipindahtangankan kepada orang lain.<br>
                3. Jika ditemukan, harap kembalikan ke alamat toko.
            </div>
        </div>

    </div>

    <script>
        // Simulasi data untuk preview
        const dataPreview = {
            toko: "MAJU JAYA",
            alamat: "Jl. Mardani Raya",
            hpToko: "Telp: 0216546889",
            nama: "Bayu",
            hp: "0265485645",
            no: "29032026-0006"
        };

        // Mengisi data preview ke kartu depan
        document.getElementById("printToko").innerText = dataPreview.toko;
        document.getElementById("printAlamat").innerText = dataPreview.alamat;
        document.getElementById("printHpToko").innerText = dataPreview.hpToko;
        // Penanganan teks untuk Nama, WhatsApp, dan ID yang lebih spesifik
        document.querySelector(".front .info").innerHTML = `
            <p>Nama: ${dataPreview.nama}</p>
            <p>WhatsApp: ${dataPreview.hp}</p>
            <p>ID: <b>${dataPreview.no}</b></p>
        `;

        // Generate Barcode
        JsBarcode("#barcode", dataPreview.no, {
            format: "CODE128",
            width: 1.5, // Sedikit lebih tipis agar muat
            height: 30, // Sedikit lebih pendek agar muat
            displayValue: false,
            margin: 0 // Hilangkan margin tambahan
        });

        // Jalankan perintah print otomatis setelah loading selesai
        window.onload = function() {
            setTimeout(() => {
                window.print();
            }, 500);
        };
    </script>
</body>
</html>
