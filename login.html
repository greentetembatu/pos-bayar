<div class="login-kasir">
  <h2>Login Kasir</h2>

  <input type="text" id="kasirId" placeholder="ID Kasir" />
  <input type="text" id="kasirNama" placeholder="Nama Kasir" />

  <button onclick="loginKasir()">Masuk</button>
  <button onclick="tambahKasir()">Daftar</button>
</div>

<script>


const kasirList = [
  { id: "KSR001", nama: "Adi" },
  { id: "KSR002", nama: "Budi" }
];

localStorage.setItem("kasirList", JSON.stringify(kasirList));



const kasirAktif = {
  id: "KSR001",
  nama: "Adi"
};

localStorage.setItem("kasirAktif", JSON.stringify(kasirAktif));


  function loginKasir() {
  const id = document.getElementById("kasirId").value;
  const nama = document.getElementById("kasirNama").value;

  const kasirList = JSON.parse(localStorage.getItem("kasirList")) || [];

  const valid = kasirList.find(k => k.id === id && k.nama === nama);

  if (!valid) {
    alert("Id Kasir tidak ditemukan!");
    return;
  }

  localStorage.setItem("kasirAktif", JSON.stringify(valid));

  window.location.href = "dashboard.html";
}









function tambahKasir() {
  const id = prompt("Masukkan ID Kasir:");
  const nama = prompt("Masukkan Nama Kasir:");

  let kasirList = JSON.parse(localStorage.getItem("kasirList")) || [];

  kasirList.push({ id, nama });

  localStorage.setItem("kasirList", JSON.stringify(kasirList));

  alert("Kasir berhasil ditambahkan!");
}



function logoutKasir() {
  if (!confirm("Yakin ingin logout?")) return;

  localStorage.removeItem("kasirAktif");
  localStorage.removeItem("keranjang");

  // pakai replace, bukan href
  window.location.replace("login.html");
}


window.addEventListener("pageshow", function (event) {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
});


window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
  window.history.go(1);
};





window.addEventListener("pageshow", function (event) {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
});



(function cekLogin() {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
})();





</script>
