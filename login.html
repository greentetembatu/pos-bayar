<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pos Bayar Login</title>

  <link rel="shortcut icon" href="icon-512.ico" type="image/x-icon" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6efd" />


<meta name="description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."/>
<meta property="og:locale" content="id_ID" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Pos Bayar" />
<meta property="og:description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel"/>
<meta property="og:url" content="https://greentetembatu.github.io/pos-bayar/"/>
<meta property="og:site_name" content="Pos Bayar" />
<meta property="og:image" content="https://greentetembatu.github.io/pos-bayar/adi-mardani-dev.png"/>
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:alt" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."/>


</head>
<body>

<style>
  /* CONTAINER (opsional kalau belum ada) */
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fa;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* BOX LOGIN */
.login-box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 280px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  text-align: center;
}

/* JUDUL */
.login-box h2 {
  margin-bottom: 20px;
  color: #333;
}

/* INPUT */
.login-box input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

.login-box input:focus {
  border-color: #4CAF50;
}

/* BUTTON */
.login-box button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: white;
  transition: 0.2s;
}

/* MASUK */
.login-box button:nth-of-type(1) {
  background: #4CAF50;
}

.login-box button:nth-of-type(1):hover {
  background: #43a047;
}

/* DAFTAR */
.login-box button:nth-of-type(2) {
  background: #2196F3;
}

.login-box button:nth-of-type(2):hover {
  background: #1e88e5;
}
</style>



<div class="login-box">
  <h2>Login Kasir</h2>

  <input type="text" id="kasirId" placeholder="ID Kasir" />
  <input type="text" id="kasirNama" placeholder="Nama Kasir" />

  <button onclick="loginKasir()">Masuk</button>
  <button onclick="tambahKasir()">Daftar</button>
  <button id="installBtn" style="display:none;">Install Aplikasi</button>
</div>


<script>

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", () => {
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((choice) => {
    if (choice.outcome === "accepted") {
      console.log("App installed");
    }
  });
});







const kasirList = [
  { id: "KSR001", nama: "Adi" },
  { id: "KSR002", nama: "Budi" }
];

localStorage.setItem("kasirList", JSON.stringify(kasirList));



const kasirAktif = {
  id: "KSR001",
  nama: "Adi"
};










localStorage.setItem("kasirAktif", JSON.stringify(kasirAktif));


  function loginKasir() {
  const id = document.getElementById("kasirId").value;
  const nama = document.getElementById("kasirNama").value;

  const kasirList = JSON.parse(localStorage.getItem("kasirList")) || [];

  const valid = kasirList.find(k => k.id === id && k.nama === nama);

  if (!valid) {
    alert("Id Kasir tidak ditemukan!");
    return;
  }

  localStorage.setItem("kasirAktif", JSON.stringify(valid));

  window.location.href = "dashboard.html";
}








function tambahKasir() {
  const id = prompt("Masukkan ID Kasir:");
  const nama = prompt("Masukkan Nama Kasir:");

  let kasirList = JSON.parse(localStorage.getItem("kasirList")) || [];

  kasirList.push({ id, nama });

  localStorage.setItem("kasirList", JSON.stringify(kasirList));

  alert("Kasir berhasil ditambahkan!");
}



function logoutKasir() {
  if (!confirm("Yakin ingin logout?")) return;

  localStorage.removeItem("kasirAktif");
  localStorage.removeItem("keranjang");

  // pakai replace, bukan href
  window.location.replace("login.html");
}


window.addEventListener("pageshow", function (event) {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
});


window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
  window.history.go(1);
};





window.addEventListener("pageshow", function (event) {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
});



(function cekLogin() {
  const kasir = JSON.parse(localStorage.getItem("kasirAktif"));

  if (!kasir) {
    window.location.replace("login.html");
  }
})();





</script>

</body>
</html>
