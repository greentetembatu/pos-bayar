<head>
  <meta charset="UTF-8">

  <link rel="shortcut icon" href="icon-512.ico" type="image/x-icon" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6efd" />


<meta name="description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel."/>

<meta property="og:type" content="website" />
<meta property="og:title" content="Pos Bayar" />
<meta property="og:description" content="Aplikasi Kasir Mandiri, Multifungsi, Fleksibel"/>
<meta property="og:url" content="https://greentetembatu.github.io/pos-bayar/"/>
<meta property="og:site_name" content="Pos Bayar" />

<style>
  /* CONTAINER (opsional kalau belum ada) */
/* Google Fonts Import */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  padding: 20px;
}

/* BOX LOGIN */
.login-box {
  background: white;
  padding: 40px 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  text-align: center;
  animation: fadeInUp 0.5s ease-out;
}

/* Animasi muncul */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* JUDUL */
.login-box h2 {
  margin-bottom: 10px;
  color: #333;
  font-size: 28px;
  font-weight: 600;
  position: relative;
  padding-bottom: 15px;
}

.login-box h2::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 3px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 2px;
}

/* Subtitle */
.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

/* INPUT GROUP */
.input-group {
  margin-bottom: 15px;
  text-align: left;
}

.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #555;
  margin-bottom: 5px;
}

.login-box input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 10px;
  border: 2px solid #e0e0e0;
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  outline: none;
  transition: all 0.3s ease;
  background: #fafafa;
}

.login-box input:focus {
  border-color: #667eea;
  background: white;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.login-box input::placeholder {
  color: #aaa;
  font-weight: 300;
}

/* BUTTON */
.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Poppins', sans-serif;
  color: white;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.login-box button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.login-box button:hover::before {
  left: 100%;
}

/* MASUK */
.login-box button:first-of-type {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.login-box button:first-of-type:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

/* DAFTAR */
.login-box button:nth-of-type(2) {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
}

.login-box button:nth-of-type(2):hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
}

/* INSTALL BUTTON */
#installBtn {
  background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
  margin-top: 15px;
}

#installBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5);
}

/* Link tambahan */
.extra-links {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid #e0e0e0;
}

.extra-links a {
  color: #667eea;
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  transition: color 0.3s ease;
}

.extra-links a:hover {
  color: #764ba2;
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
  .login-box {
    padding: 30px 20px;
    max-width: 320px;
  }
  
  .login-box h2 {
    font-size: 24px;
  }
  
  .login-box input,
  .login-box button {
    padding: 10px;
  }
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  
  .login-box {
    background: #2d2d3a;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  
  .login-box h2 {
    color: #fff;
  }
  
  .subtitle {
    color: #aaa;
  }
  
  .input-group label {
    color: #ccc;
  }
  
  .login-box input {
    background: #3d3d4a;
    border-color: #4d4d5a;
    color: #fff;
  }
  
  .login-box input:focus {
    background: #4d4d5a;
    border-color: #667eea;
  }
  
  .login-box input::placeholder {
    color: #888;
  }
  
  .extra-links a {
    color: #8b9aff;
  }
}

</style>



<div class="login-box">
  <h2>Login Kasir</h2>

  <input type="text" id="kasirId" placeholder="ID Kasir" />
  <input type="text" id="kasirNama" placeholder="Nama Kasir" />

  <button onclick="loginKasir()">Masuk</button>
  <button onclick="tambahKasir()">Daftar</button>
  <button id="installBtn" style="display:none;">Install Aplikasi</button>
</div>


<script>

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", () => {
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((choice) => {
    if (choice.outcome === "accepted") {
      console.log("App installed");
    }
  });
});







function loginKasir() {
  const id = document.getElementById("kasirId").value.trim();
  const nama = document.getElementById("kasirNama").value.trim();

  const kasirList =
    JSON.parse(localStorage.getItem("kasirList")) || [];

  const valid = kasirList.find(
    (k) =>
      k.id.toLowerCase() === id.toLowerCase() &&
      k.nama.toLowerCase() === nama.toLowerCase()
  );

  if (!valid) {
    alert("ID atau Nama Kasir salah!");
    return;
  }

  localStorage.setItem(
    "kasirAktif",
    JSON.stringify(valid)
  );

  alert("Login berhasil!");

  window.location.href = "dashboard.html";
}

function tambahKasir() {
  const id = prompt("Masukkan ID Kasir:");
  const nama = prompt("Masukkan Nama Kasir:");

  if (!id || !nama) {
    alert("ID dan Nama wajib diisi");
    return;
  }

  let kasirList =
    JSON.parse(localStorage.getItem("kasirList")) || [];

  // cek duplikat
  const sudahAda = kasirList.find(
    (k) => k.id.toLowerCase() === id.toLowerCase()
  );

  if (sudahAda) {
    alert("ID Kasir sudah digunakan!");
    return;
  }

  kasirList.push({
    id: id.trim(),
    nama: nama.trim(),
  });

  localStorage.setItem(
    "kasirList",
    JSON.stringify(kasirList)
  );

  alert("Kasir berhasil ditambahkan!");
}

</script>
